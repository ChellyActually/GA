<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="module" src="main.js" defer></script>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h4 id="lastRefreshed">Last refreshed : </h4>

    <div class="upload-section">
        <h2>Upload Receipt</h2>
        <input type="file" id="imageInput" accept="image/*">
        <button id="uploadBtn">Upload Image</button>
    </div>

    <div class="recipe-section">
        <h3>Recipe with ingredients which are about to expire</h3>
        <button id="get-recipe" type="button">Get Recipe</button>
        <button id="hide-recipe" type="button">hide Recipe</button>
        <div id="recipe-display"></div>
    </div>

    <div class="grocery-items">
        <h1>Grocery Items</h1>
        <div class="grocery-list"></div>
    </div>
    <div class="about-to-expire">
        <h1>About to Expire</h1>
        <div class="ate-list"></div>
    </div>
    <div class="expired">
        <h1>Expired Items</h1>
        <div class="expired-list"></div>
    </div>
</body>
</html>
